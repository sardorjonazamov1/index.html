<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="figma.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <div class="nav_wrap">
                    <img src="./img/Logo.svg" alt="Brand Logo">
                    <div class="nav_loc">
                        <p>Deliver to:<img src="./img/map-marker-alt.svg" alt="location icon"><address> Current Location
                        Mohammadpur Bus Stand, Dhaka</address>
                        </p>
                    </div>
                    <div class="nav_fr">
                    <div class="food_search">
                        <img class="nav_img" src="./img/Search.svg" alt="search btn">
                        <label for="food">
                        <input type="text" id="food" placeholder="Search Food"></label>
                    </div>
                    <div class="log_in">
                        <img src="./img/user.png" alt="logo">
                        <p>Log in</p>
                    </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="hero">
            <div class="container">
                <div class="hero_wrap">
                    <div class="hero_info">
                       <h1>Are you starving?</h1>
                       <p class="set_info">Within a few clicks, find meals that are accessible near you</p>
                       <img src="./img/Order Card.png" alt="order Card">
                    </div>
                    <div class="img_hero">
                        <img src="./img/Image (1).png" alt="img">
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
</body>
</html>
